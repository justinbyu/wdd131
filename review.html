<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Justin Diaz">
    <meta name="description" content="Thank you for submitting your feedback! This is the official review confirmation page that validates your submission and securely updates our local data metrics. Our system has successfully processed your product ratings, installation details, and useful feature selections, saving them directly into our localized browser storage counter. Your highly valued contribution has been officially tallied, and the updated total review count is now displayed dynamically on your screen. Customer insights are the backbone of our quality assurance process, and your specific critique helps our development team refine future innovations while assisting other shoppers in selecting the best hardware components. From this confirmation dashboard, you can view your submission milestone tracker, review our standard copyright credentials, verify the document's latest modification timestamp, or easily navigate back to the main input form to voice your opinion on another product from our inventory catalog.">
    <title>Review Confirmed</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/review.js" defer></script>
</head>
<body>
    <header>
        <h1>Thank You!</h1>
    </header>

    <main style="text-align: center;">
        <h2>Review Submitted Successfully</h2>
        <p>Your feedback helps us maintain high quality standards.</p>
        
        <hr>
        
        <p>Total Reviews Completed on this Browser: <strong id="review-counter">0</strong></p>
        
        <p><a href="form.html" style="color: var(--primary-color); font-weight: bold;">Submit another review</a></p>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> | Product Review Project | Justin Diaz</p>
        <p>Last Modified: <span id="last-modified"></span></p>
    </footer>
</body>
</html>
