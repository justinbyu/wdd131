<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="author" content="Justin Diaz">
    <meta name="description" content="Review your latest tech purchases and rate features like the flux capacitor and power laces on our official Product Review Form.">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <fieldset>
                <legend>Select a Product</legend>
                <label for="product-select">Product Name:</label>
                <select id="product-select" name="product" required>
                    <option value="" disabled selected>Choose a Product...</option>
                    </select>
            </fieldset>

            <fieldset>
                <legend>Overall Rating</legend>
                <div class="rating-group">
                    <input type="radio" id="rating-1" name="rating" value="1" required>
                    <label for="rating-1">1 Star</label>

                    <input type="radio" id="rating-2" name="rating" value="2">
                    <label for="rating-2">2 Stars</label>

                    <input type="radio" id="rating-3" name="rating" value="3">
                    <label for="rating-3">3 Stars</label>

                    <input type="radio" id="rating-4" name="rating" value="4">
                    <label for="rating-4">4 Stars</label>

                    <input type="radio" id="rating-5" name="rating" value="5">
                    <label for="rating-5">5 Stars</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Date of Purchase</legend>
                <label for="purchase-date">Date Installed:</label>
                <input type="date" id="purchase-date" name="purchaseDate" required>
            </fieldset>

            <fieldset>
                <legend>Features Reviewed (Select all that apply)</legend>
                <div class="checkbox-group">
                    <input type="checkbox" id="feature-flux" name="features" value="flux-capacitor">
                    <label for="feature-flux">Flux Capacitor</label>
                    
                    <input type="checkbox" id="feature-laces" name="features" value="power-laces">
                    <label for="feature-laces">Power Laces</label>
                    
                    <input type="checkbox" id="feature-hover" name="features" value="hover-board">
                    <label for="feature-hover">Hover Board</label>
                    
                    <input type="checkbox" id="feature-time" name="features" value="time-circuits">
                    <label for="feature-time">Time Circuits</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Your Review</legend>
                <label for="review-text">Written Review (Optional):</label>
                <textarea id="review-text" name="review" rows="5" placeholder="Share your experience with this product..."></textarea>
            </fieldset>

            <fieldset>
                <legend>Reviewer Information</legend>
                <label for="user-name">Your Name (Optional):</label>
                <input type="text" id="user-name" name="userName">
            </fieldset>

            <div class="form-actions">
                <button type="submit">Submit Review</button>
            </div>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Justin | WDD 131 Assignment</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
