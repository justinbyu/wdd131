<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Review your latest tech purchases and rate features like the flux capacitor and power laces on our official Product Review Form.">
    <meta name="author" content="Justin Diaz">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            
            <label for="product">Product Name:</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
                <option value="flux-capacitor">Flux Capacitor</option>
                <option value="power-laces">Power Laces</option>
                <option value="hoverboard">Hoverboard</option>
            </select>

            <fieldset>
                <legend>Overall Rating</legend>
                <label><input type="radio" name="rating" value="1" required> 1 Star</label>
                <label><input type="radio" name="rating" value="2" required> 2 Stars</label>
                <label><input type="radio" name="rating" value="3" required> 3 Stars</label>
                <label><input type="radio" name="rating" value="4" required> 4 Stars</label>
                <label><input type="radio" name="rating" value="5" required> 5 Stars</label>
            </fieldset>

            <label for="review-date">Date of Purchase:</label>
            <input type="date" id="review-date" name="review-date" required>

            <fieldset>
                <legend>Features Useful to You (Select at least one)</legend>
                <label><input type="checkbox" name="features" value="durability"> Durability</label>
                <label><input type="checkbox" name="features" value="design"> Sleek Design</label>
                <label><input type="checkbox" name="features" value="performance"> High Performance</label>
                <label><input type="checkbox" name="features" value="value"> Good Value</label>
            </fieldset>

            <label for="comments">Written Review:</label>
            <textarea id="comments" name="comments" rows="5" placeholder="Share your experience with this product..."></textarea>

            <button type="submit">Submit Review</button>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> | Justin Diaz | Utah</p>
    </footer>
</body>
</html>
