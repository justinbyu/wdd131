<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Review your latest tech purchases and rate features like the flux capacitor and power laces on our official Product Review Form.">
    <meta name="author" content="Justin Diaz">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            
            <label id="product-label" for="product-name">Product Name</label>
            <select id="product-name" name="product-name" required>
                <option value="" disabled selected>Choose a Product...</option>
                <option value="flux">Flux Capacitor</option>
                <option value="laces">Power Laces</option>
                <option value="hover">Hoverboard</option>
            </select>

            <fieldset>
                <legend>Overall Rating</legend>
                <div class="rating-group">
                    <input type="radio" id="rating-1" name="rating" value="1" required>
                    <label for="rating-1">1 Star</label>

                    <input type="radio" id="rating-2" name="rating" value="2">
                    <label for="rating-2">2 Stars</label>

                    <input type="radio" id="rating-3" name="rating" value="3">
                    <label for="rating-3">3 Stars</label>

                    <input type="radio" id="rating-4" name="rating" value="4">
                    <label for="rating-4">4 Stars</label>

                    <input type="radio" id="rating-5" name="rating" value="5">
                    <label for="rating-5">5 Stars</label>
                </div>
            </fieldset>

            <label for="install-date">Date of Installation</label>
            <input type="date" id="install-date" name="install-date" required>

            <fieldset>
                <legend>Features Useful to You</legend>
                <div class="checkbox-group">
                    <input type="checkbox" id="feature-design" name="features" value="design">
                    <label for="feature-design">Sleek Design</label>

                    <input type="checkbox" id="feature-durability" name="features" value="durability">
                    <label for="feature-durability">Durability</label>

                    <input type="checkbox" id="feature-performance" name="features" value="performance">
                    <label for="feature-performance">High Performance</label>

                    <input type="checkbox" id="feature-ui" name="features" value="ui">
                    <label for="feature-ui">Easy UI</label>
                </div>
            </fieldset>

            <label for="review-comments">Written Review (Optional)</label>
            <textarea id="review-comments" name="review-comments" rows="5" placeholder="Share your experience with this product..."></textarea>

            <button type="submit">Submit Review</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Justin Diaz | BYU-Idaho</p>
    </footer>
</body>
</html>
