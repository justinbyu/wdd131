<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Project Title</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/project.js" defer></script>
</head>
<body>
    <header>
        <h1>Project Topic Title</h1>
        <button id="menu-toggle" aria-label="Toggle Menu">&#9776;</button>
        <nav id="main-nav">
            <a href="index.html" class="active">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="join.html">Get Involved</a>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h2>Welcome to the Project</h2>
            <p>This site serves a specific target audience and purpose outlined in the site plan.</p>
        </section>

        <section id="featured-content">
            <h3>Featured Content</h3>
            <picture>
                <img src="images/placeholder-low.jpg" data-src="images/optimized-hero.jpg" alt="Description of optimized image" loading="lazy" class="lazy-img">
            </picture>
            <div id="dynamic-cards">
                </div>
        </section>

        <section id="form-section">
            <h3>Feedback & Inquiries</h3>
            <form id="project-form" action="thanks.html" method="get">
                <label biographies-label for="user-name">Name:</label>
                <input type="text" id="user-name" name="userName" required>

                <label for="user-email">Email:</label>
                <input type="email" id="user-email" name="userEmail" required>

                <label for="interest-select">Topic of Interest:</label>
                <select id="interest-select" name="interest" required>
                    <option value="" disabled selected>Select an option...</option>
                    <option value="web-dev">Web Development</option>
                    <option value="design">UI/UX Design</option>
                    <option value="other">Other</option>
                </select>

                <button type="submit">Submit</button>
            </form>
            <p id="visit-counter"></p>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> | Your Name | BYU-Idaho</p>
        <p>Last Modified: <span id="last-modified"></span></p>
        <p><a href="references.html">References Page</a></p>
    </footer>
</body>
</html>
